<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirect</title>
    <script>
      var path = window.location.pathname;
      var repo = "/portfolio-web";

      var newUrl = repo + "/?redirect=" + path.replace(repo, "");

      window.location.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
